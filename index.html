<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rugby Perf">
  <meta name="theme-color" content="#0a0a0b">
  <title>Rugby Perf</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="page active" id="page-home"></div>

  <!-- PROGRAM -->
  <div class="page" id="page-program"></div>

  <!-- SESSION ACTIVE -->
  <div class="page" id="page-session">
    <div class="page-header"><div class="page-title">SÉANCE</div></div>
    <div style="padding:0 16px;text-align:center;padding-top:40px">
      <div style="font-size:48px;margin-bottom:12px">🏋</div>
      <div style="font-size:16px;color:var(--text2)">Lance une séance depuis le programme</div>
    </div>
  </div>

  <!-- STATS -->
  <div class="page" id="page-stats"></div>

  <!-- POSTURE -->
  <div class="page" id="page-posture"></div>

  <!-- PROFILE -->
  <div class="page" id="page-profile"></div>

  <!-- BOTTOM NAV -->
  <nav id="bottom-nav">
    <button class="nav-item active" data-page="home" onclick="navigate('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="nav-label">Accueil</span>
    </button>
    <button class="nav-item" data-page="program" onclick="navigate('program')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span class="nav-label">Programme</span>
    </button>
    <button class="nav-item" data-page="stats" onclick="navigate('stats')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span class="nav-label">Stats & IA</span>
    </button>
    <button class="nav-item" data-page="posture" onclick="navigate('posture')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="5" r="2"/><path d="M12 7v6M9 10h6M9 22l3-5 3 5"/></svg>
      <span class="nav-label">Posture</span>
    </button>
    <button class="nav-item" data-page="profile" onclick="navigate('profile')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span class="nav-label">Profil</span>
    </button>
  </nav>

  <!-- EXERCISE DETAIL SHEET -->
  <div class="sheet-overlay" id="exercise-sheet" onclick="if(event.target===this)closeSheet('exercise-sheet')">
    <div class="sheet" id="exercise-sheet-content"></div>
  </div>

</div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="data/exercises.js"></script>
<script src="js/storage.js"></script>
<script src="js/ai-engine.js"></script>
<script src="js/app.js"></script>
</body>
</html>
